<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Who Fucked This</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Staatliches&display=swap');

    :root {
      --acid-pink: #ff00ff;
      --neon-green: #00ff9c;
      --electric-blue: #00e5ff;
      --acid-yellow: #ffee00;
      --void-black: #020025;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Staatliches', sans-serif;
      text-align: center;
      background:
        repeating-linear-gradient(
          45deg,
          var(--acid-pink),
          var(--acid-pink) 30px,
          var(--electric-blue) 30px,
          var(--electric-blue) 60px
        );
    }

    .overlay {
      min-height: 100vh;
      padding-top: 20vh;
      background:
        radial-gradient(
          circle,
          rgba(0,0,0,0.2),
          var(--void-black) 70%
        );
      backdrop-filter: blur(4px);
    }

    h1 {
      font-size: 5em;
      letter-spacing: 5px;
      margin-bottom: 30px;
      color: var(--acid-yellow);
      text-transform: uppercase;

      text-shadow:
        -4px -4px 0 var(--acid-pink),
         4px -4px 0 var(--neon-green),
        -4px  4px 0 var(--electric-blue),
         4px  4px 0 #000,
         0 0 25px var(--acid-yellow);
    }

    .name {
      font-size: 2.2em;
      max-width: 900px;
      margin: 0 auto;
      padding: 25px;
      line-height: 1.4;
      background: linear-gradient(
        135deg,
        var(--neon-green),
        var(--electric-blue)
      );
      color: #000;
      border: 6px solid var(--acid-pink);
      box-shadow:
        0 0 20px var(--neon-green),
        inset 0 0 15px #fff;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <h1>Who Fucked This?</h1>

    <div class="name">
      Karloskar – Completely fucked the NBN migration. Did it immediately instead of booking it and fucked everything.
    </div>
  </div>
</body>
</html>
