<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Who Fucked This</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Staatliches&display=swap');

    :root {
      --neon-red: #ff3b3b;
      --dark-bg: #050014;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'Staatliches', sans-serif;
      text-align: center;
      background-color: var(--dark-bg);

      /* Repeating tiny shark background */
      background-image:
        url("data:image/svg+xml;utf8,\
        <svg xmlns='http://www.w3.org/2000/svg' width='80' height='80' viewBox='0 0 80 80'>\
          <text x='10' y='50' font-size='40'>🦈</text>\
        </svg>");
      background-repeat: repeat;
    }

    .overlay {
      min-height: 100vh;
      padding-top: 25vh;
      background: radial-gradient(
        circle at top,
        rgba(0, 0, 0, 0.3),
        rgba(0, 0, 0, 0.85) 70%
      );
    }

    h1 {
      font-size: 4.5em;
      letter-spacing: 3px;
      margin-bottom: 30px;
      color: var(--neon-red);

      /* Black outline + glow for readability */
      text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000,
         0 0 12px rgba(255, 59, 59, 0.7);
    }

    .name {
      font-size: 2em;
      max-width: 900px;
      margin: 0 auto;
      line-height: 1.4;
      color: #ff6b6b;

      text-shadow:
        -1px -1px 0 #000,
         1px -1px 0 #000,
        -1px  1px 0 #000,
         1px  1px 0 #000;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <h1>Who Fucked This?</h1>

    <div class="name">
      Karloskar – Completely fucked the NBN migration! Did it immmediately instead of booking it, and fucked EVERYTHING!
    </div>
  </div>
</body>
</html>
